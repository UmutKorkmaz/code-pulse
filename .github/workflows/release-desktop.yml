name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - macos-latest
          - ubuntu-latest
          - windows-latest

    defaults:
      run:
        working-directory: platform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: platform/package-lock.json

      - name: Install Linux desktop dependencies
        if: matrix.platform == 'ubuntu-latest'
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build desktop bundle
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: platform/apps/desktop

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: code-pulse-desktop-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            platform/apps/desktop/src-tauri/target/release/bundle/**/*

      - name: Draft GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            platform/apps/desktop/src-tauri/target/release/bundle/**/*
