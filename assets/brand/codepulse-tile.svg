<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="codepulse-tile-title codepulse-tile-desc">
  <title id="codepulse-tile-title">Code Pulse app icon</title>
  <desc id="codepulse-tile-desc">A layered teal and coral ECG pulse on a dark rounded square tile.</desc>
  <defs>
    <linearGradient id="tile-bg" x1="512" y1="0" x2="512" y2="1024" gradientUnits="userSpaceOnUse">
